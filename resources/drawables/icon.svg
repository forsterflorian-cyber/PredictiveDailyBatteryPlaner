<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="budgetGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E676"></stop>
      <stop offset="55%" stop-color="#00B0FF"></stop>
      <stop offset="100%" stop-color="#FFD54F"></stop>
    </linearGradient>
  </defs>

  <!-- äußerer Ring -->
