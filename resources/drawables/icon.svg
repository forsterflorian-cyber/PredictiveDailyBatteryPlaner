           A44 44 0 0 1 94 50" fill="none" stroke="#FFD54F" stroke-width="8" stroke-linecap="round"></path>

  <path d="M50 94
           A44 44 0 0 1 6 50" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"></path>

  <!-- Smartphone -->
  <rect x="34" y="22" width="32" height="56" rx="6" fill="#FFFFFF"></rect>

  <rect x="38" y="30" width="24" height="38" rx="3" fill="url(#budgetGrad)"></rect>

  <!-- obere Aussparung / Lautsprecher -->
